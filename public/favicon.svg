  <rect x="10" y="8" width="4" height="4" fill="#111" />
  <rect x="14" y="8" width="4" height="4" fill="#111" />
  <rect x="18" y="8" width="4" height="4" fill="#111" />
  <!-- leaves -->
  <rect x="6" y="12" width="4" height="4" fill="#111" />
  <rect x="10" y="12" width="4" height="4" fill="#111" />
